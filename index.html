<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My incremental game!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="mainTabs">

<button class="tab-button tabBtn" data-tab="mainTab">Main</button>

<button id="prestigeTabButton"
        class="tab-button tabBtn prestigeBtn"
        data-tab="prestigeTab"
        style="display:none;">Prestige</button>

<button id="automationButton"
        class="tab-button tabBtn automationBtn"
        data-tab="automationTab"
        style="display:none;">Automation</button>
<button id="ascendTabButton" class="tab-button tabBtn ascensionBtn" data-tab="ascendTab" style="display: none;">Ascension</button>
</div>
<br>
<div id="mainTab" class="tab">
Points: <span id="points">0</span> (<span id="idle">0</span>/s)<br>
<button onclick="pointClick()" style="padding: 8px 15px;">Click me!</button><br><br>
<div id="clickUpgrades"></div><br>
<div id="multiplierUpgrades"></div><br>
<div id="compoundUpgrades"></div><br>
<div id="autoclickerUpgrades"></div><br>

    Prestige: <span id="prestige">0</span><br>
    <button onclick="prestige()">Prestige<br><span id="prestigeAmount">1M</span></button><br>
    <div id="ascension-box" style="display: none;">Ascension: <span id="ascension">0</span><br>
    <button onclick="ascend()">Ascension<br><span id="ascendAmount">1B PP</span></button></div>
</div>
<div id="prestigeTab" class="tab" style="display:none;">
    <div class="subtabs">
        <button class="subtab-button" data-subtab="upgrades">Upgrades</button>
        <button class="subtab-button" id="chargeButton" data-subtab="charge">Charge</button>
    </div>

    <div id="upgrades" class="subtab" style="display: block;">
        <div id="upgradesContainer"></div>
    </div>

    <div id="charge" class="subtab">
        Charge: <span id="chargeText">0</span> (<span id="chargeGen">0</span>/s)<br>
        Charge milestones: <br>
        <div id="featureContainer"></div>
    </div>

</div>
<div id="automationTab" class="tab" style="display: none;"></div>
<div id="ascendTab" class="tab" style="display: none;">
    <div class="subtabs">
        <button class="subtab-button" data-subtab="ascUpgrades">Upgrades</button>
        <button class="subtab-button" data-subtab="milestones">Milestone</button>
        <button class="subtab-button" data-subtab="challenges" style="display: none;">Challenges</button>
    </div>

    <div id="ascUpgrades" class="subtab">
        Ascension upgrades:
        <div id="ascUpgradesContainer"></div>
    </div>
        
    <div id="milestones" class="subtab">
        Ascension milestones:
        <div id="ascMilestones"></div>
    </div>

    <div id="challenges" class="subtab"></div>

</div>
    <script src="https://cdn.jsdelivr.net/npm/break_infinity.js@2/dist/break_infinity.min.js"></script>
    <script src="game.js"></script>
    <script src="save.js"></script>
    <script src="tabs.js"></script>
    <script src="ui.js"></script>
    <script src="prestige.js"></script>
    <script src="prestige_charge.js"></script>
    <script src="ascension.js"></script>
    <script src="ascension_milestones.js"></script>
    <script src="main.js"></script>
    <script src="automation.js"></script>
</body>
</html>
