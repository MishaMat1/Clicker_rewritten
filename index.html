<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My incremental game!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<button onclick="openTab('mainTab')" class="tabBtn">Main</button>
<button id="prestigeTabButton" onclick="openTab('prestigeTab')" class="tabBtn" style="display:none;">Prestige</button>
<button id="automationButton" onclick="openTab('automationTab')" class="tabBtn" style="display: none;">Automation</button><br><br>
<div id="mainTab" class="tab">
Points: <span id="points">0</span> (<span id="idle">0</span>/s)<br>
<button onclick="pointClick()" style="padding: 8px 15px;">Click me!</button><br><br>
<div id="clickUpgrades"></div><br>
<div id="multiplierUpgrades"></div><br>
<div id="compoundUpgrades"></div><br>
<div id="autoclickerUpgrades"></div><br>

    Prestige: <span id="prestige">0</span><br>
    <button onclick="prestige()">Prestige<br><span id="prestigeAmount">1000000</span></button><br>
</div>
<div id="prestigeTab" class="tab" style="display:none;"></div>
<div id="automationTab" class="tab" style="display: none;"></div>
    <script src="https://cdn.jsdelivr.net/npm/break_infinity.js@2/dist/break_infinity.min.js"></script>
    <script src="game.js"></script>
    <script src="save.js"></script>
    <script src="tabs.js"></script>
    <script src="ui.js"></script>
    <script src="prestige.js"></script>
    <script src="main.js"></script>
    <script src="automation.js"></script>
</body>
</html>
